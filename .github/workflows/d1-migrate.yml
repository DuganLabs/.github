name: d1-migrate (reusable)

# Reusable workflow: apply Cloudflare D1 migrations idempotently.
# Uses `wrangler d1 migrations apply` which tracks applied files in the
# d1_migrations table — re-running is safe.
# Cloudflare credentials sourced from Doppler at call time.

on:
  workflow_call:
    inputs:
      database:
        type: string
        required: true
      migrations-dir:
        type: string
        default: "migrations"     # default per wrangler convention
      node-version:
        type: string
        default: "20"
      package-manager:
        type: string
        default: "pnpm"
    secrets:
      DOPPLER_TOKEN:
        required: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Install dependencies
        run: |
          case "${{ inputs.package-manager }}" in
            pnpm) pnpm install --frozen-lockfile ;;
            npm)  npm ci ;;
            bun)  curl -fsSL https://bun.sh/install | bash && ~/.bun/bin/bun install --frozen-lockfile ;;
          esac

      - name: Apply D1 migrations (idempotent)
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          if [ ! -d "${{ inputs.migrations-dir }}" ]; then
            echo "No migrations dir at ${{ inputs.migrations-dir }} — skipping."
            exit 0
          fi
          # `wrangler d1 migrations apply` discovers files in the configured
          # migrations dir (default ./migrations). It tracks applied files in
          # the d1_migrations table, so re-runs are no-ops.
          doppler run -- npx wrangler d1 migrations apply ${{ inputs.database }} --remote
