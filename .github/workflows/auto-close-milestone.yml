name: auto-close-milestone

# Closes a milestone when its last open issue/PR is closed.
# Per the GitHub-as-truth rule: GitHub state should reflect code state automatically.

on:
  issues:
    types: [closed]
  pull_request:
    types: [closed]

permissions:
  issues: write
  pull-requests: write

jobs:
  close-milestone:
    if: github.event.issue.milestone || github.event.pull_request.milestone
    runs-on: ubuntu-latest
    steps:
      - name: Close empty milestone
        uses: actions/github-script@v7
        with:
          script: |
            const m = context.payload.issue?.milestone || context.payload.pull_request?.milestone;
            if (!m) return;
            const milestone = await github.rest.issues.getMilestone({
              owner: context.repo.owner,
              repo: context.repo.repo,
              milestone_number: m.number,
            });
            if (milestone.data.open_issues === 0 && milestone.data.state === 'open') {
              await github.rest.issues.updateMilestone({
                owner: context.repo.owner,
                repo: context.repo.repo,
                milestone_number: m.number,
                state: 'closed',
              });
              core.info(`Closed milestone #${m.number} — all issues resolved.`);
            }
